<section class="experience section" id="experience" [class.visible]="isVisible">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">&lt;Kinh nghiệm /&gt;</span>
      <h2 class="section-title">Hành trình của tôi</h2>
      <div class="section-line"></div>
    </div>

    <div class="timeline">
      <div class="timeline-line"></div>

      <div class="timeline-item"
           *ngFor="let exp of experiences; let i = index; let odd = odd"
           [class.right]="odd"
           [style.animation-delay]="(i * 0.2) + 's'">
        <div class="timeline-dot">
          <i [class]="exp.icon"></i>
        </div>
        <div class="timeline-card">
          <div class="card-header">
            <h3 class="card-position">{{ exp.position }}</h3>
            <span class="card-duration">{{ exp.duration }}</span>
          </div>
          <h4 class="card-company">
            <i [class]="exp.icon" style="margin-right: 0.4rem;"></i>
            {{ exp.company }}
          </h4>
          <ul class="card-list">
            <li *ngFor="let desc of exp.description">{{ desc }}</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
