<section class="about section" id="about" [class.visible]="isVisible">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">&lt;Giới thiệu /&gt;</span>
      <h2 class="section-title">Về bản thân</h2>
      <div class="section-line"></div>
    </div>

    <div class="about-grid">
      <div class="about-image">
        <div class="image-frame">
          <div class="image-placeholder">
            <i class="fas fa-code"></i>
          </div>
          <div class="frame-border"></div>
        </div>
        <div class="experience-badge">
          <span class="badge-number">1+</span>
          <span class="badge-text">Năm<br>Kinh nghiệm</span>
        </div>
      </div>

      <div class="about-content">
        <h3 class="about-subtitle">Frontend Developer Intern tại TP.HCM</h3>
        <p class="about-text">{{ info.description }}</p>

        <div class="about-details">
          <div class="detail-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>{{ info.location }}</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-envelope"></i>
            <span>{{ info.email }}</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-graduation-cap"></i>
            <span>ĐH Bách Khoa TP.HCM</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-circle" style="color: #22c55e; font-size: 0.5rem;"></i>
            <span>Sẵn sàng nhận việc</span>
          </div>
        </div>

        <div class="about-stats">
          <div class="stat-item" *ngFor="let stat of stats">
            <span class="stat-value">{{ stat.value }}{{ stat.suffix }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
