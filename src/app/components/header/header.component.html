<header class="header" [class.scrolled]="isScrolled">
  <div class="header-container">
    <a class="logo" (click)="scrollTo('hero')">
      <span class="logo-bracket">&lt;</span>
      <span class="logo-text">{{ info.name.split(' ').pop() }}</span>
      <span class="logo-bracket"> /&gt;</span>
    </a>

    <nav class="nav-desktop">
      <a *ngFor="let link of navLinks"
         class="nav-link"
         (click)="scrollTo(link.target)">
        {{ link.label }}
      </a>
    </nav>

    <button class="hamburger" [class.active]="isMobileMenuOpen" (click)="toggleMobileMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <nav class="nav-mobile" [class.open]="isMobileMenuOpen">
    <a *ngFor="let link of navLinks"
       class="nav-link-mobile"
       (click)="scrollTo(link.target)">
      {{ link.label }}
    </a>
  </nav>
</header>
